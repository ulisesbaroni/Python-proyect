<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Viajero{% endblock %}</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #f5f5f5; color: #333; }
        nav { background: #2c3e50; padding: 12px 24px; display: flex; align-items: center; gap: 20px; }
        nav a { color: #fff; text-decoration: none; font-size: 15px; }
        nav a:hover { text-decoration: underline; }
        nav .brand { font-weight: bold; font-size: 18px; margin-right: auto; }
        .container { max-width: 960px; margin: 30px auto; padding: 0 20px; }
        h1, h2 { margin-bottom: 16px; }
        .btn { display: inline-block; padding: 8px 16px; border-radius: 4px; text-decoration: none; font-size: 14px; cursor: pointer; border: none; }
        .btn-primary { background: #2980b9; color: #fff; }
        .btn-primary:hover { background: #2471a3; }
        .btn-secondary { background: #7f8c8d; color: #fff; }
        .btn-secondary:hover { background: #6c7a7d; }
        .btn-danger { background: #c0392b; color: #fff; }
        .btn-danger:hover { background: #a93226; }
        .alert { padding: 10px 16px; border-radius: 4px; margin-bottom: 16px; background: #fdecea; color: #c0392b; border: 1px solid #e74c3c; }
    </style>
</head>
<body>
    <nav>
        <a href="{% url 'home' %}" class="brand">🗺️ Viajero</a>
        {% if user.is_authenticated %}
            <a href="{% url 'visitidea_list' %}">Mis ideas</a>
            <a href="{% url 'visitidea_create' %}">+ Nueva</a>
            <a href="{% url 'about' %}">Acerca de mí</a>
            <a href="/admin/">Admin</a>
            <span style="color:#aaa; margin-left:auto;">{{ user.username }}</span>
        {% else %}
            <a href="{% url 'about' %}">Acerca de mí</a>
            <a href="{% url 'login' %}">Iniciar sesión</a>
        {% endif %}
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
