{% extends 'base.html' %}

{% block title %}Login - Viajero{% endblock %}

{% block content %}
<h1>Iniciar sesión</h1>

{% if error %}
    <div class="alert">{{ error }}</div>
{% endif %}

<form method="POST" style="max-width:400px; margin-top:20px;">
    {% csrf_token %}
    <div style="margin-bottom:14px;">
        <label style="display:block; margin-bottom:4px; font-weight:bold;">Usuario</label>
        <input type="text" name="username" style="width:100%; padding:8px; border:1px solid #ccc; border-radius:4px;">
    </div>
    <div style="margin-bottom:14px;">
        <label style="display:block; margin-bottom:4px; font-weight:bold;">Contraseña</label>
        <input type="password" name="password" style="width:100%; padding:8px; border:1px solid #ccc; border-radius:4px;">
    </div>
    <button type="submit" class="btn btn-primary">Entrar</button>
    <a href="{% url 'registro' %}" style="margin-left:10px;">¿No tenés cuenta?</a>
</form>
{% endblock %}
