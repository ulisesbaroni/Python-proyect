{% extends 'base.html' %}

{% block title %}Cambiar contraseña - Viajero{% endblock %}

{% block content %}
<h1 class="mb-4">Cambiar contraseña</h1>

{% if error %}
    <div class="alert alert-danger">{{ error }}</div>
{% endif %}

<form method="POST" style="max-width:400px;">
    {% csrf_token %}

    <div class="mb-3">
        <label class="form-label fw-bold">Contraseña actual</label>
        <input type="password" name="password_actual" class="form-control" placeholder="Tu contraseña actual">
    </div>

    <div class="mb-3">
        <label class="form-label fw-bold">Nueva contraseña</label>
        <input type="password" name="password_nueva" class="form-control" placeholder="Nueva contraseña">
    </div>

    <div class="mb-3">
        <label class="form-label fw-bold">Confirmá la nueva contraseña</label>
        <input type="password" name="password_confirmar" class="form-control" placeholder="Repetí la nueva contraseña">
    </div>

    <button type="submit" class="btn btn-primary">Guardar</button>
    <a href="{% url 'perfil' %}" class="btn btn-outline-secondary ms-2">Cancelar</a>
</form>
{% endblock %}
