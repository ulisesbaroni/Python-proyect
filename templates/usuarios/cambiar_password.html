{% extends 'base.html' %}

{% block title %}Cambiar contraseña - Viajero{% endblock %}

{% block content %}
<h1>Cambiar contraseña</h1>

{% if error %}
    <div class="alert">{{ error }}</div>
{% endif %}

<form method="POST" style="max-width:400px; margin-top:20px;">
    {% csrf_token %}
    <div style="margin-bottom:14px;">
        <label style="display:block; margin-bottom:4px; font-weight:bold;">Contraseña actual</label>
        <input type="password" name="password_actual" style="width:100%; padding:8px; border:1px solid #ccc; border-radius:4px;">
    </div>
    <div style="margin-bottom:14px;">
        <label style="display:block; margin-bottom:4px; font-weight:bold;">Nueva contraseña</label>
        <input type="password" name="password_nueva" style="width:100%; padding:8px; border:1px solid #ccc; border-radius:4px;">
    </div>
    <div style="margin-bottom:14px;">
        <label style="display:block; margin-bottom:4px; font-weight:bold;">Confirmar nueva contraseña</label>
        <input type="password" name="password_confirmar" style="width:100%; padding:8px; border:1px solid #ccc; border-radius:4px;">
    </div>
    <button type="submit" class="btn btn-primary">Cambiar</button>
    <a href="{% url 'perfil' %}" class="btn btn-secondary" style="margin-left:10px;">Cancelar</a>
</form>
{% endblock %}
