{% extends 'base.html' %}

{% block title %}{{ accion }} lugar - Viajero{% endblock %}

{% block content %}
<h1 class="mb-4">{{ accion }} lugar</h1>

<form method="POST" enctype="multipart/form-data" style="max-width:500px;">
    {% csrf_token %}
    {% for field in form %}
        <div class="mb-3">
            <label class="form-label fw-bold">{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}
                <div class="text-danger small">{{ field.errors.0 }}</div>
            {% endif %}
        </div>
    {% endfor %}
    <button type="submit" class="btn btn-primary">{{ accion }}</button>
    <a href="{% url 'place_list' %}" class="btn btn-outline-secondary ms-2">Cancelar</a>
</form>
{% endblock %}
