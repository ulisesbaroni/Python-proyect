{% extends 'base.html' %}

{% block title %}Borrar lugar - Viajero{% endblock %}

{% block content %}
<h1 class="mb-3">¿Borrar "{{ place.nombre }}"?</h1>
<p class="text-muted">Esta acción no se puede deshacer.</p>

<form method="POST" class="mt-3">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Sí, borrar</button>
    <a href="{% url 'place_list' %}" class="btn btn-outline-secondary ms-2">Cancelar</a>
</form>
{% endblock %}
