{% extends 'base.html' %}

{% block title %}Borrar lugar - Viajero{% endblock %}

{% block content %}
<h1>¿Borrar "{{ place.nombre }}"?</h1>
<p style="margin:16px 0; color:#555;">Esta acción no se puede deshacer.</p>

<form method="POST">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Sí, borrar</button>
    <a href="{% url 'place_list' %}" class="btn btn-secondary" style="margin-left:10px;">Cancelar</a>
</form>
{% endblock %}
